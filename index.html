<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mindmap">
</head>
<body>
  <div id="toolbar">
    <button id="homeBtn" class="primary" title="Home — recent folders / open another" aria-label="Home — recent folders">
      <span class="ic" data-icon="home"></span><span id="folderName"></span></button>
    <button id="fitBtn" title="Focus selected card · fit whole map if none (F)" aria-label="Focus selected or fit map">
      <span class="ic" data-icon="fit"></span></button>
    <button id="edgeBtn" title="Edge style: straight / orthogonal / bezier" aria-label="Cycle edge style">
      <span class="ic" data-icon="edge-style"></span></button>
    <button id="undoBtn" disabled title="Undo (Ctrl/⌘ Z)" aria-label="Undo">
      <span class="ic" data-icon="undo"></span></button>
    <button id="redoBtn" disabled title="Redo (Ctrl Y / ⇧⌘Z)" aria-label="Redo">
      <span class="ic" data-icon="redo"></span></button>
    <span class="sep"></span>
    <span id="status"></span>
    <button id="roBtn" title="Read-only mode (R) — view & collapse only, nothing is saved" aria-label="Toggle read-only mode">
      <span class="ic" data-icon="lock"></span></button>
    <button id="themeBtn" title="Toggle light / dark mode" aria-label="Toggle theme"></button>
    <button id="helpBtn" title="Open help (F1)" aria-label="Open help">
      <span class="ic" data-icon="help"></span>
      <span id="helpHint" class="emptyhint" aria-hidden="true">
        <svg class="hint-arrow" viewBox="0 0 24 46" width="24" height="46" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 44 Q 20 24 12 4"/><path d="M12 4l-6 6M12 4l7 4"/></svg>
        <span>Click for help</span>
      </span></button>
    <div id="searchWrap">
      <span class="ic" data-icon="search"></span>
      <input id="searchBox" type="text" placeholder="" title="Find card (/)" aria-label="Find a card" autocomplete="off" spellcheck="false" />
      <button id="searchClear" title="Clear search" aria-label="Clear search">
        <span class="ic" data-icon="close"></span></button>
      <div id="searchResults"></div>
    </div>
  </div>

  <div id="stage">
    <div id="world">
      <!-- group backgrounds: the "encloses card + descendants" tint, behind everything else -->
      <svg id="backgrounds"></svg>
      <svg id="edges"></svg>
      <!-- toggles overlay renders ABOVE node divs so collapse dots are always visible -->
      <svg id="toggles"></svg>
      <!-- drag overlay: the dragged card's edges + the reparent preview edge render here,
           above every other card and edge, so the thing you're dragging is never occluded -->
      <svg id="dragEdges"></svg>
    </div>
  </div>

  <div id="editor" class="open">
    <div id="edEmpty" class="editnote">Select a node to edit it, or press <kbd>Space</kbd> for a new one.</div>
    <div id="edFields">
      <div id="edMulti" class="editnote"></div>
      <div id="edName" class="ed-name" title="To rename: press F2 or slow-click the card on the canvas"></div>
      <div class="fgroup fg-color">
        <label>Color</label>
        <div id="edColors" class="swatches"></div>
      </div>
      <div class="fgroup fg-layout">
        <label>Layout (how children align)</label>
        <div class="layoutrow">
          <div id="edLayoutTypes" class="layoutchips"></div>
        </div>
      </div>
      <div class="fgroup fg-checklist">
        <label class="checkbox-label"><input id="edChecklist" type="checkbox"> Checklist</label>
      </div>
      <div class="fgroup fg-bg">
        <label class="checkbox-label"><input id="edBg" type="checkbox"> Group background</label>
      </div>
      <div class="fgroup fg-tags">
        <label>Tags (comma)</label>
        <input id="edTags" type="text" placeholder="mechanic, system" />
      </div>
    </div>
    <!-- selected-card actions: moved here from the toolbar; enabled only with a selection -->
    <div id="edActions">
      <label>Actions</label>
      <div class="actionrow">
        <button id="edRename" disabled title="Rename selected card (F2)" aria-label="Rename selected card">
          <span class="ic" data-icon="rename"></span></button>
        <button id="edDuplicate" disabled title="Duplicate (D)" aria-label="Duplicate selected card">
          <span class="ic" data-icon="duplicate"></span></button>
        <button id="edDelete" disabled title="Delete selected card(s) (Delete)" aria-label="Delete selected card(s)">
          <span class="ic" data-icon="delete"></span></button>
      </div>
    </div>
  </div>

  <!-- ghost card in the corner — drag it onto the canvas to create a new card -->
  <div id="ghostCard" title="Drag to create a new card">+</div>

  <!-- first-run hints: shown only while the canvas is empty (body.empty-canvas) -->
  <div id="ghostHint" class="emptyhint" aria-hidden="true">
    <svg class="hint-arrow" viewBox="0 0 52 22" width="52" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M50 8 Q 24 20 5 13"/><path d="M5 13l9-3M5 13l6 7"/></svg>
    <span>Drag to create a card</span>
  </div>

  <!-- home screen: storage settings (the map itself opens straight onto the canvas) -->
  <div id="startScreen" class="hidden">
    <div class="start-card">
      <button id="startClose" class="start-close" aria-label="Close" title="Close">✕</button>
      <h2>Markdown Mindmap</h2>
      <p>Your map is saved <b>on this device</b> and opens automatically. Manage where it lives:</p>
      <div id="storeStatus" class="store-status"></div>
      <button id="startOpen" class="primary"><span class="ic" data-icon="folder-open"></span> Open a local folder…</button>
      <div id="recentWrap" style="display:none">
        <div class="recent-label">Recent folders</div>
        <div id="recentList"></div>
      </div>
      <div class="store-actions">
        <button id="importBtn"><span class="ic" data-icon="import"></span> Import .zip</button>
        <button id="exportBtn"><span class="ic" data-icon="export"></span> Export .zip</button>
      </div>
      <button id="useDeviceBtn" class="linkish">↩ Use on-device storage</button>
      <p class="start-note">A local folder needs Chrome or Edge. Import/export works everywhere.</p>
    </div>
  </div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
