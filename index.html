<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#11151c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mindmap">
</head>
<body>
  <!-- home / storage: floating bar in the top-left; the folder name sits beside the button -->
  <div id="homeBar">
    <button id="homeBtn" class="floating-btn" title="Home — recent folders / open another" aria-label="Home — recent folders">
      <span class="ic" data-icon="home"></span></button>
    <span id="folderName"></span>
  </div>

  <div id="toolbar">
    <button id="undoBtn" disabled title="Undo (Ctrl/⌘ Z)" aria-label="Undo">
      <span class="ic" data-icon="undo"></span></button>
    <button id="redoBtn" disabled title="Redo (Ctrl Y / ⇧⌘Z)" aria-label="Redo">
      <span class="ic" data-icon="redo"></span></button>
    <button id="fitBtn" title="Focus selected card · fit whole map if none (F)" aria-label="Focus selected or fit map">
      <span class="ic" data-icon="fit"></span></button>
    <button id="edgeBtn" title="Edge style — click to cycle" aria-label="Cycle edge style">
      <span class="ic" data-icon="edge-orthogonal"></span></button>
    <span class="sep"></span>
    <span id="status"></span>
    <button id="roBtn" title="Read-only mode (R) — view & collapse only, nothing is saved" aria-label="Toggle read-only mode">
      <span class="ic" data-icon="lock"></span></button>
    <button id="themeBtn" title="Toggle light / dark mode" aria-label="Toggle theme"></button>
    <button id="searchBtn" title="Find card (/)" aria-label="Find a card">
      <span class="ic" data-icon="search"></span></button>
  </div>

  <!-- floating search bar: opened by #searchBtn, drops below the toolbar (features/search.ts) -->
  <div id="searchWrap">
    <span class="ic" data-icon="search"></span>
    <input id="searchBox" type="text" placeholder="Find a card…" title="Find card (/)" aria-label="Find a card" autocomplete="off" spellcheck="false" />
    <button id="searchClear" title="Clear search" aria-label="Clear search">
      <span class="ic" data-icon="close"></span></button>
    <div id="searchResults"></div>
  </div>

  <div id="stage">
    <div id="world">
      <!-- background grid (none/dot/line, toggled by #gridBtn): behind everything, incl. group
           backgrounds. Pattern cell size defaults to 20 world units — matching GRID_SNAP in
           main.ts, where dragged cards snap to — but is independently adjustable via
           #gridSizeBtn (view/grid.ts sets width/height/d on gridDotPat/gridLinePat directly).
           Lives inside #world so it inherits the pan/zoom transform for free, no per-frame
           position math needed — deliberately a plain scaling stroke, NOT vector-effect
           non-scaling-stroke: that forces the browser to re-rasterize the stroke geometry against
           the live CTM on every frame of a zoom gesture instead of just compositing the cached
           layer, which was jank/flicker severe enough to bleed into the cards painted alongside
           it. view/camera.ts fades the whole layer out at low on-screen cell density instead
           (view/grid.ts updateGridZoom) — that alone keeps a dense/zoomed-out grid from ever
           getting fine enough to moiré. -->
      <svg id="grid">
        <defs>
          <pattern id="gridDotPat" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="var(--grid-pat)"/>
          </pattern>
          <pattern id="gridLinePat" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="var(--grid-pat)" stroke-width="1"/>
          </pattern>
        </defs>
        <rect id="gridRect" x="-100000" y="-100000" width="200000" height="200000" fill="none"/>
      </svg>
      <!-- group backgrounds: the "encloses card + descendants" tint, behind everything else -->
      <svg id="backgrounds"></svg>
      <!-- freehand sketch layer: ink drawn on the canvas, always on top of the cards (z-index, see styles.css) -->
      <svg id="sketch"></svg>
      <svg id="edges"></svg>
      <!-- toggles overlay renders ABOVE node divs so collapse dots are always visible -->
      <svg id="toggles"></svg>
      <!-- drag overlay: the dragged card's edges + the reparent preview edge render here,
           above every other card and edge, so the thing you're dragging is never occluded -->
      <svg id="dragEdges"></svg>
      <!-- drag GROUP layer: while dragging, the dragged cards AND their connectors are moved in
           here so the whole set composites as ONE translucent group (opacity on the layer, not
           per item) — you see the canvas below but the dragged items never shine through each
           other. Its own edges SVG stays first so connectors sit behind the cards. -->
      <div id="dragLayer"><svg id="dragLayerEdges"></svg></div>
    </div>
  </div>

  <!-- outline mode: the map as a collapsible tree list (body.outline; features/outline.ts) -->
  <div id="outline">
    <!-- back arrow (features/branch-editor.ts), close-outline button, and new-card button: all
         siblings of the SCROLLING #olScroll below, not children of it — #outline's own transform
         (desktop drawer) makes it the containing block for a position:absolute descendant, and if
         that descendant also lived inside the scrolling box, it would scroll away with the list
         instead of staying put. Being #outline's own descendants (not fixed to the viewport) also
         means all three centre/anchor on the DRAWER's own width on a wide screen, not the whole
         screen. #ocBack / #olCloseBtn share the same top-left spot and are mutually exclusive
         (styles.css): the back arrow only while the branch editor is open, the close button
         otherwise (wide screens only — on a phone the outline is forced full-screen and can't be
         closed, same as the toolbar's own outline toggle; visible in read-only too, since closing
         isn't a mutating action). -->
    <button id="ocBack" class="oc-back" title="Back to list" aria-label="Back to list">
      <span class="ic" data-icon="back"></span></button>
    <button id="olCloseBtn" class="ol-close" aria-label="Close outline" title="Close outline">✕</button>
    <div class="ol-head">
      <div class="ol-search">
        <span class="ic" data-icon="search"></span>
        <input id="olSearch" type="search" enterkeyhint="search" placeholder="Search" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="Search cards">
      </div>
      <button id="olAddBtn" title="New card — child of the selected card (Tab)" aria-label="New card">
        <span class="ol-add-plus">+</span></button>
    </div>
    <div class="ol-scroll" id="olScroll">
      <!-- scrolls away with the list (a normal sibling of #olRows inside the scroll box), not a
           sticky header — hidden with the row list while the single-card editor is open. -->
      <h1 class="ol-heading"></h1>
      <div class="ol-rows" id="olRows"></div>
      <!-- branch editor: tapping a row shows this card + its siblings as full editable cards
           (title + note), rendered by features/branch-editor.ts. Toggled via body.ol-editing. -->
      <div class="ol-cards" id="olCards"></div>
    </div>
  </div>

  <!-- properties for the active branch card: colour / tags / checklist / group background (the same
       shared control logic as the canvas float bar, features/properties.ts). Kept OUTSIDE #outline — like the
       New-card button above — so its position:fixed resolves against the VIEWPORT and pins to the
       bottom (a fixed child of the transformed, scrolling drawer would ride the scroll instead). On
       desktop it's aligned to the outliner drawer's width; on phone it spans the screen bottom.
       Drag the handle down to dismiss it. -->
  <div id="branchProps" aria-label="Card properties">
    <div class="bp-handle" role="button" tabindex="0" aria-label="Dismiss properties" title="Drag down to dismiss"></div>
    <div class="fgroup fg-color">
      <label>Color</label>
      <div id="bpColors" class="swatches"></div>
    </div>
    <div class="bp-toggles">
      <label class="checkbox-label"><input id="bpChecklist" type="checkbox"> Checklist</label>
      <label class="checkbox-label"><input id="bpBg" type="checkbox"> Group background</label>
    </div>
    <div class="fgroup fg-tags">
      <label>Tags (comma)</label>
      <input id="bpTags" type="text" placeholder="mechanic, system" autocomplete="off" spellcheck="false" list="tagSuggestions" />
    </div>
  </div>

  <!-- shared autocomplete source for every free-text tags input (populated from features/tags.ts) -->
  <datalist id="tagSuggestions"></datalist>

  <!-- starts closed (no "open" class) so it doesn't flash in before syncFloatBar() runs.
       Canvas-only; floats next to the selected card (features/float-bar.ts). In outline mode
       editing happens in the branch editor (#olCards). -->
  <div id="floatBar">
    <button id="fbColor" class="fb-swatch swatch inherit" title="Colour — click for the full palette" aria-label="Colour"></button>
    <button id="fbType" class="fb-icon" title="Type — card / frame / image / annotation / query" aria-label="Type"></button>
    <button id="fbLayout" class="fb-icon" title="Layout — click for options" aria-label="Layout"></button>
    <label class="fb-icon fb-toggle" title="Checklist" aria-label="Checklist">
      <input id="fbChecklist" type="checkbox"><span class="ic" data-icon="checklist"></span></label>
    <label class="fb-icon fb-toggle" title="Group background" aria-label="Group background">
      <input id="fbBg" type="checkbox"><span class="ic" data-icon="group-bg"></span></label>
    <span class="fb-sep"></span>
    <button id="fbMore" class="fb-icon" title="More actions" aria-label="More actions">
      <span class="ic" data-icon="kebab"></span></button>
  </div>
  <div id="fbColorPop" class="fb-pop">
    <div id="edColors" class="swatches"></div>
  </div>
  <div id="fbTypePop" class="fb-pop">
    <div id="edTypes" class="layoutchips"></div>
  </div>
  <div id="fbLayoutPop" class="fb-pop">
    <div id="edLayoutTypes" class="layoutchips"></div>
  </div>
  <!-- thin stem bridging an open popover to the bar — see .fb-pop-connector in styles.css -->
  <div id="fbPopConnector" class="fb-pop-connector"></div>

  <!-- full-screen editor sheet (phone / outline): title + note body, explicit Done.
       Shown via body.sheet-open; driven by features/editor-sheet.ts -->
  <div id="editorSheet" role="dialog" aria-label="Edit card">
    <div class="sheet-head">
      <button id="shCancel" title="Cancel (Esc)" aria-label="Cancel">✕</button>
      <input id="shTitle" type="text" autocomplete="off" spellcheck="false" aria-label="Card title">
      <button id="shDone" title="Save & close (⌘⏎)" aria-label="Save and close">Done</button>
    </div>
    <textarea id="shBody" spellcheck="false" placeholder="Add note…" aria-label="Card note"></textarea>
  </div>

  <!-- canvas menu: floating top-right, left of the outline button — a permanent kebab so canvas
       actions (new card, insert image, paste, fit view) are reachable without a right-click / long-press
       (iOS Safari's synthesized contextmenu on the empty canvas is unreliable). Shares the same entry
       list as the right-click menu (features/context-menu.ts canvasMenuEntries). -->
  <button id="canvasMenuBtn" class="floating-btn" title="Canvas menu — new card, insert image…" aria-label="Canvas menu">
    <span class="ic" data-icon="kebab"></span></button>

  <!-- outline toggle: floating top-right, next to the sketch button — two separate buttons,
       not a shared bar (see their individual positioning in styles.css). -->
  <button id="outlineBtn" class="floating-btn" title="Outline view (O) — browse & edit the map as a list" aria-label="Toggle outline view">
    <span class="ic" data-icon="outline"></span></button>

  <!-- sketch toggle: floating top-right, outside the toolbar -->
  <button id="sketchBtn" class="floating-btn" title="Sketch (S) — draw freehand on the canvas" aria-label="Toggle sketch mode">
    <span class="ic" data-icon="sketch"></span></button>

  <!-- tag panel toggle: floating top-right, one slot further left again. Mutually exclusive with
       sketch mode (features/tags.ts / features/sketch.ts) — opening one closes the other. -->
  <button id="tagBtn" class="floating-btn" title="Tags — browse, assign, rename or delete tags" aria-label="Toggle tag panel">
    <span class="ic" data-icon="tag"></span></button>

  <!-- background grid toggle: floating bottom-right, immediately left of help (features/../view/grid.ts) -->
  <button id="gridBtn" class="floating-btn" title="Background grid — click to cycle" aria-label="Cycle background grid"></button>

  <!-- grid size picker: one slot further left of the grid style toggle (view/grid.ts) -->
  <button id="gridSizeBtn" class="floating-btn" title="Grid size — click to choose" aria-label="Grid size"></button>

  <!-- help toggle: floating bottom-right, outside the toolbar -->
  <button id="helpBtn" class="floating-btn" title="Open help (F1)" aria-label="Open help">
    <span class="ic" data-icon="help"></span>
    <span id="helpHint" class="emptyhint" aria-hidden="true">
      <span>Click for help</span>
      <svg class="hint-arrow" viewBox="0 0 24 46" width="24" height="46" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2 Q 20 22 12 42"/><path d="M12 42l-6-6M12 42l7-4"/></svg>
    </span></button>

  <!-- sketch sidebar: replaces the edit panel while sketch mode is on (populated by features/sketch.ts) -->
  <div id="sketchPanel">
    <div class="sk-title">Sketch</div>
    <div class="fgroup">
      <label>Tool</label>
      <div class="sk-tools">
        <button id="sketchPen" title="Pen — draw" aria-label="Pen">
          <span class="ic" data-icon="sketch"></span> Pen</button>
        <button id="sketchEraser" title="Eraser — remove a whole stroke" aria-label="Eraser">
          <span class="ic" data-icon="eraser"></span> Erase</button>
      </div>
    </div>
    <div class="fgroup">
      <label>Colour</label>
      <div id="sketchColors" class="sketch-dots colors"></div>
    </div>
    <div class="fgroup">
      <label>Width</label>
      <div id="sketchWidths" class="sketch-dots widths"></div>
    </div>
  </div>

  <!-- tag panel: lists every tag currently in use (populated by features/tags.ts). Unlike the
       sketch panel, the floating edit bar stays visible alongside it. -->
  <div id="tagPanel">
    <div class="tp-title">Tags</div>
    <div id="tagRows"></div>
  </div>

  <!-- ghost card in the corner — drag it onto the canvas to create a new card -->
  <div id="ghostCard" title="Drag to create a new card">+</div>

  <!-- first-run hints: shown only while the canvas is empty (body.empty-canvas) -->
  <div id="ghostHint" class="emptyhint" aria-hidden="true">
    <svg class="hint-arrow" viewBox="0 0 52 22" width="52" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M50 8 Q 24 20 5 13"/><path d="M5 13l9-3M5 13l6 7"/></svg>
    <span>Drag to create a card</span>
  </div>

  <!-- home sidebar: slides in from the left (home button). Tabs pick the storage backend,
       "+" creates/opens a map there, the list below shows that backend's maps. Clicking
       the space right of the sidebar closes it. -->
  <div id="startScreen" class="hidden">
    <aside id="storeSidebar" aria-label="Your maps">
      <div class="side-head">
        <div class="store-tabs" role="tablist">
          <button id="tabDevice" class="store-tab" role="tab">On device</button>
          <button id="tabFolder" class="store-tab" role="tab">Local folder</button>
        </div>
        <button id="startClose" class="start-close" aria-label="Close" title="Close">✕</button>
      </div>
      <button id="newBtn" class="side-row"><span class="ic" data-icon="plus"></span><span id="newBtnLabel">New map</span></button>
      <div id="mapList"></div>
      <div class="side-footer">
        <button id="importBtn" class="side-row" title="Import a .zip as a new map"><span class="ic" data-icon="import"></span> Import .zip</button>
        <div class="side-about">
          <a href="https://github.com/ahackel/mindmap" target="_blank" rel="noopener" title="Source code on GitHub"><span class="ic" data-icon="github"></span>GitHub</a>
          <span id="appVersion"></span>
        </div>
      </div>
    </aside>
  </div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
