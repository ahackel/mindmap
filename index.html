<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Markdown Mindmap</title>
<style>
  :root {
    --bg: #11151c;
    --grid: #1b212c;
    --node: #1e2733;
    --node-border: #34465c;
    --node-sel: #5aa9ff;
    --edge: #4a5d75;
    --text: #e6ecf3;
    --muted: #8a99ad;
    --accent: #5aa9ff;
    --panel: #0d1117;
  }
  /* ---- light theme: override the base variables ---- */
  body.light {
    --bg: #e7eaef;
    --grid: #d4d9e1;
    --node: #ffffff;
    --node-border: #cfd6e0;
    --node-sel: #2f6fe0;
    --edge: #9aa6b6;
    --text: #1a2230;
    --muted: #5d6b7e;
    --accent: #2f6fe0;
    --panel: #ffffff;
  }

  /* 8-colour muted palette — fills the whole card background (dark theme) */
  /* card colours are identical in both themes; text on a card is always white */
  .c-slate  { --card:#4860c0; --cardline:#7088e0; }
  .c-red    { --card:#d62f48; --cardline:#f25c72; }
  .c-amber  { --card:#d18a1d; --cardline:#f2ab44; }
  .c-green  { --card:#1ba85a; --cardline:#3fcf81; }
  .c-teal   { --card:#129fb3; --cardline:#33c5d8; }
  .c-blue   { --card:#2f7fe8; --cardline:#5fa3f5; }
  .c-violet { --card:#7a42da; --cardline:#9d70f0; }
  .c-pink   { --card:#d6368e; --cardline:#f262ad; }
  .c-grey   { --card:#2b3645; --cardline:#4a5a6e; }
  /* "none" = no colour at all: blend into the canvas, no border (border returns when selected) */
  .c-none   { --card:var(--bg); --cardline:transparent; }

  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; overflow:hidden;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); }

  #toolbar {
    position: fixed; top:0; left:0; right:0; height:48px; z-index:20;
    display:flex; align-items:center; gap:10px; padding:0 14px;
    background: var(--panel); border-bottom:1px solid var(--grid);
  }
  #toolbar h1 { font-size:14px; font-weight:600; margin:0 8px 0 0; letter-spacing:.2px; }
  #toolbar .sep { flex:1; }
  button {
    background: var(--node); color: var(--text); border:1px solid var(--node-border);
    border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color:#fff; border-color: var(--accent); font-weight:600; }
  button.active { border-color: var(--accent); color: var(--accent); }
  button:disabled { opacity:.45; cursor:default; }
  /* toolbar buttons are borderless, monochrome clickable icons (icon = currentColor) */
  #toolbar button {
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; padding:0; border-radius:8px;
    background:transparent; border:none; color:var(--muted);
  }
  #toolbar button:hover { background:var(--node); color:var(--text); }
  #toolbar button.primary { color:var(--accent); }
  #toolbar button.active { color:var(--accent); }
  #toolbar button#roBtn.locked { color:#e0564f; }   /* red while read-only is locked */
  #toolbar button#roBtn.locked:hover { color:#e0564f; background:var(--node); }
  #toolbar button svg { width:18px; height:18px; display:block; }
  #status { display:none; }   /* transient log messages are not shown in the toolbar */
  /* home button = folder icon + loaded-folder name as one clickable element */
  #toolbar button#homeBtn { width:auto; gap:6px; padding:0 9px; }
  #homeBtn #folderName { font-size:13px; font-weight:600; color:var(--text);
    max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #homeBtn #folderName:empty { display:none; }   /* icon-only until a folder is loaded */
  #toolbar button#homeBtn:hover #folderName { color:var(--text); }
  /* find / jump-to-card */
  #searchWrap { position:relative; }
  #searchBox { width:160px; height:30px; padding:0 10px; border-radius:8px; font-size:13px;
    background:var(--node); border:1px solid var(--node-border); color:var(--text); }
  #searchBox:focus { outline:none; border-color:var(--accent); width:220px; }
  #searchResults { position:absolute; top:36px; left:0; min-width:240px; max-height:50vh; overflow:auto;
    background:var(--panel); border:1px solid var(--grid); border-radius:8px; padding:4px;
    display:none; z-index:30; }
  #searchResults.open { display:block; }
  #searchResults .sr-item { display:block; width:100%; text-align:left; padding:6px 9px; border-radius:6px;
    font-size:13px; color:var(--text); background:transparent; border:none; cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #searchResults .sr-item:hover, #searchResults .sr-item.active { background:var(--node); }
  #searchResults .sr-none { padding:6px 9px; font-size:12px; color:var(--muted); }

  /* touch-action:none → the browser never steals pan/zoom gestures; we drive them ourselves */
  #stage { position:fixed; inset:48px 0 0 0; overflow:hidden; cursor:default; touch-action:none; }
  #stage.panning { cursor:grabbing; }
  /* the hand only appears while actually dragging a card; default everywhere else */
  body.grabbing, body.grabbing * { cursor:grabbing !important; }
  #world { position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; touch-action:none; }

  svg#edges, svg#toggles { position:absolute; top:0; left:0; overflow:visible; }
  svg#edges { z-index:1; pointer-events:none; }      /* curves behind nodes */
  .node { z-index:2; }                               /* nodes in the middle */
  svg#toggles { z-index:3; pointer-events:none; }    /* toggles on top; group re-enables events */
  svg#edges path { fill:none; stroke:var(--edge); stroke-width:4;
    stroke-linejoin:round; stroke-linecap:round; }

  .node {
    position:absolute; width:200px; min-height:64px;
    background: var(--card, var(--node)); border:1px solid var(--cardline, var(--node-border));
    border-radius:2px; padding:10px 12px; cursor:default; color:#ffffff;
    user-select:none; -webkit-touch-callout:none; touch-action:none;
    /* fade opacity (search dim) & selection ring smoothly; NOT left/top — keeps dragging crisp */
    transition: opacity .2s ease, box-shadow .15s ease;
  }
  /* only while expanding/collapsing: glide cards to their new spots (added/removed in JS) */
  .node.lt-anim { transition: opacity .2s ease, box-shadow .15s ease,
    left .3s cubic-bezier(.22,1,.36,1), top .3s cubic-bezier(.22,1,.36,1); }
  /* bodyless cards shrink to just fit the title (no reserved body height) */
  .node.no-body { min-height:0; }
  .node.no-body .title { margin-bottom:0; }
  /* an uncoloured card sits on the page background, so its text follows the theme, not white */
  .node.c-none { color: var(--text); }
  .node.sel { border-color: var(--node-sel); box-shadow:0 0 0 2px var(--node-sel); }
  .node.drop-target { outline:2px dashed #5ac978; outline-offset:3px;
    box-shadow:0 0 0 2px #5ac978; }
  /* while poised over a valid parent the dragged card becomes just a dotted outline,
     so the parent underneath stays visible */
  .node.reparent-ghost { background:transparent !important; box-shadow:none !important;
    border:2px dashed var(--node-sel); }
  .node.reparent-ghost > * { visibility:hidden; }
  /* break long words / URLs and clip anything that still overflows the card horizontally */
  .node .title { font-weight:600; font-size:14px; margin-bottom:9px; padding-right:16px;
    overflow-wrap:anywhere; overflow:hidden; }
  /* inline title rename (slow-click / F2 / on-create): edit the card's title in place */
  .node .title.editing { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;
    cursor:text; white-space:pre-wrap; overflow:visible; background:rgba(255,255,255,.06); }
  .node .title.editing.invalid { outline-color:#e0564a; }
  .node .body  { font-size:12px; color:inherit; opacity:.9; line-height:1.4;
    overflow-wrap:anywhere; overflow:hidden; }
  /* markdown elements inside a card body — tight spacing, clipped preview */
  .node .body > :first-child { margin-top:0; }
  .node .body > :last-child  { margin-bottom:0; }
  .node .body ul, .node .body ol,
  .node .body blockquote, .node .body pre { margin:.3em 0; }
  .node .body p { margin:.3em 0 .75em; }   /* a little breathing room after each paragraph */
  .node .body h1,.node .body h2,.node .body h3,
  .node .body h4,.node .body h5,.node .body h6 { margin:.3em 0; font-size:12px; font-weight:700; }
  .node .body ul,.node .body ol { padding-left:1.1em; }
  .node .body li { margin:.1em 0; }
  .node .body li.task { list-style:none; margin-left:-1.0em; display:flex; align-items:flex-start; gap:.4em; }
  .node .body li.task .taskbox { margin:.15em 0 0; cursor:pointer; accent-color:var(--accent); flex:none; }
  .node .body strong { font-weight:700; }
  .node .body em { font-style:italic; }
  .node .body del { opacity:.7; }
  .node .body code { font-family:ui-monospace,Menlo,monospace; font-size:11px;
    background:rgba(255,255,255,.16); padding:0 3px; border-radius:3px; }
  .node .body pre { background:rgba(0,0,0,.28); padding:6px 8px; border-radius:4px; overflow:hidden; }
  .node .body pre code { background:none; padding:0; }
  .node .body blockquote { border-left:2px solid rgba(255,255,255,.4); padding-left:8px;
    margin-left:0; opacity:.85; }
  .node .body hr { border:none; border-top:1px solid rgba(255,255,255,.3); margin:.4em 0; }
  .node .body .lk { color:#fff; text-decoration:underline; text-underline-offset:2px;
    cursor:pointer; font-weight:600; opacity:1; }
  .node .body .lk:hover { text-decoration-thickness:2px; }
  .node .badge { display:inline-block; margin-top:6px; font-size:10px; letter-spacing:.4px;
    text-transform:uppercase; color:var(--tint); border:1px solid var(--tint);
    border-radius:6px; padding:1px 6px; opacity:.85; }
  /* add-child button, only on selected node */
  .node .addchild { position:absolute; right:-14px; bottom:-14px; width:28px; height:28px;
    border-radius:50%; background:var(--accent); color:#fff;
    font-size:18px; line-height:1; cursor:pointer; display:none;
    align-items:center; justify-content:center; font-weight:700; }
  .node.solo .addchild { display:flex; }   /* add-child only on a lone selection, not multi-select */
  body.readonly .node .addchild { display:none !important; }   /* no add-child in read-only */
  .node.search-dim { opacity:.2; }         /* dimmed while a find query excludes this card */
  .node .addchild:hover { transform:scale(1.12); }
  /* count chip shown when a node's children are collapsed — centred on the card's
     upper-right corner, clear of the add-child (+) button at the lower-right */
  .node .hidden-count { position:absolute; right:0; top:0; transform:translate(50%,-50%);
    background:var(--accent);
    color:#fff; font-size:11px; font-weight:700; border-radius:11px; padding:2px 8px;
    line-height:1; display:none; align-items:center; justify-content:center; }
  .node.has-collapsed .hidden-count { display:inline-flex; }
  .node.has-collapsed { border-style:dashed; }   /* hint that this node holds folded children */
  /* matching empty-swatch in light theme */
  body.light .swatch.inherit { background:repeating-linear-gradient(45deg,#fff,#fff 5px,#e7ebf1 5px,#e7ebf1 10px); }

  #editor {
    position:fixed; top:48px; right:0; bottom:0; width:304px; z-index:15;
    background:var(--panel); border-left:1px solid var(--grid); padding:16px;
    display:flex; flex-direction:column; gap:10px;
    transform:translateX(100%);                 /* parked off-screen when closed */
    transition:transform .25s cubic-bezier(.4,0,.2,1);
  }
  #editor.open { transform:translateX(0); }      /* slide in from the right */
  #edFields { flex:1; display:flex; flex-direction:column; gap:10px; min-height:0; }
  #edFields .fgroup { display:flex; flex-direction:column; gap:6px; }
  #edFields .fg-body { flex:1; min-height:0; }
  .fg-body-head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  #extractBtn { font-size:11px; padding:3px 8px; border-radius:6px; cursor:pointer;
    background:var(--node); color:var(--text); border:1px solid var(--node-border); }
  #extractBtn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  #extractBtn:disabled { opacity:.4; cursor:default; }
  /* empty state vs. fields: only one shows at a time, driven by .has-selection */
  #editor #edFields { display:none; }
  #editor.has-selection #edFields { display:flex; }
  #editor.has-selection #edEmpty { display:none; }
  /* multi-select: only the colour picker applies; hide single-node fields, show the count */
  #edMulti { display:none; }
  #editor.multi #edMulti { display:block; }
  #editor.multi #edName, #editor.multi .fg-tags,
  #editor.multi .fg-body { display:none; }
  /* read-only node name shown at the top of the sidebar (renaming happens on the canvas) */
  #editor .ed-name { font-size:16px; font-weight:600; color:var(--text); line-height:1.3;
    overflow-wrap:anywhere; padding-bottom:8px; border-bottom:1px solid var(--grid); }
  /* rubber-band marquee drawn over the canvas while drag-selecting */
  #marquee { position:absolute; display:none; z-index:5; pointer-events:none;
    border:1px dotted var(--accent); background:color-mix(in srgb, var(--accent) 15%, transparent); }
  #editor label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  #editor input, #editor textarea, #editor select {
    background:var(--node); color:var(--text); border:1px solid var(--node-border);
    border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; width:100%;
  }
  #editor textarea { flex:1; resize:none; font-family: ui-monospace, "SF Mono", Menlo, monospace; line-height:1.5; }
  #editor .row { display:flex; gap:8px; }
  #editor .editnote { font-size:11px; color:var(--muted); line-height:1.5; }
  /* all swatches share one row and shrink to fit (inherit + 9 colours + none) */
  .swatches { display:flex; gap:6px; flex-wrap:nowrap; }
  .swatch { flex:1 1 0; min-width:0; aspect-ratio:1; border-radius:7px; cursor:pointer;
    border:2px solid transparent; background:var(--sw); }
  .swatch:hover { transform:scale(1.12); }
  .swatch.active { border-color:var(--text); }
  /* inherit (the default): striped chip = "take the parent's colour" */
  .swatch.inherit { background:repeating-linear-gradient(45deg,#1e2733,#1e2733 5px,#2a3543 5px,#2a3543 10px); }
  /* explicit no-colour: a blank chip with a diagonal slash — does NOT inherit */
  .swatch.nofill { border:2px solid var(--node-border); background:
    linear-gradient(to top right, transparent calc(50% - 1.2px), #e0564a calc(50% - 1.2px),
      #e0564a calc(50% + 1.2px), transparent calc(50% + 1.2px)), var(--bg); }
  /* layout pickers: each row is one segmented toolbar (joined icon buttons) */
  .layoutrow { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .layoutchips { display:inline-flex; border:1px solid var(--node-border);
    border-radius:8px; overflow:hidden; background:var(--node); }
  .layoutchip { width:40px; height:30px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    background:transparent; color:var(--muted); border:0; }
  .layoutchip + .layoutchip { border-left:1px solid var(--node-border); }   /* segment dividers */
  .layoutchip svg { width:20px; height:20px; }
  .layoutchip:hover { color:var(--text); background:color-mix(in srgb, var(--text) 8%, transparent); }
  .layoutchip.active { color:#fff; background:var(--accent); }
  .layoutchip.disabled { opacity:.35; cursor:default; }
  .layoutchip.disabled:hover { color:var(--muted); background:transparent; }

  kbd { background:var(--node); border:1px solid var(--node-border); border-radius:4px;
    padding:0 5px; font-size:11px; }

  /* start screen */
  #startScreen { position:fixed; inset:0; z-index:40; display:flex;
    align-items:center; justify-content:center; background:var(--bg); }
  #startScreen.hidden { display:none; }
  .start-card { width:min(440px, 90vw); background:var(--panel); border:1px solid var(--grid);
    border-radius:16px; padding:28px; }
  .start-card h2 { margin:0 0 6px; font-size:20px; }
  .start-card p { margin:0 0 18px; color:var(--muted); font-size:13px; line-height:1.5; }
  .start-card .primary { width:100%; padding:11px; font-size:14px; margin-bottom:14px; }
  .start-card .ghost { width:100%; padding:9px; background:transparent; color:var(--muted);
    margin-top:6px; }
  .recent-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--muted); margin:6px 0 8px; }
  .recent-item { display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    padding:9px 11px; margin-bottom:6px; background:var(--node); border:1px solid var(--node-border);
    border-radius:9px; cursor:pointer; font-size:13px; }
  .recent-item:hover { border-color:var(--accent); }
  .recent-item .ri-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .recent-item .ri-when { font-size:11px; color:var(--muted); }
  .start-note { margin:14px 0 0 !important; font-size:11px !important; }
  .start-card { position:relative; }
  .start-close { position:absolute; top:10px; right:12px; width:28px; height:28px; padding:0;
    background:transparent; border:none; color:var(--muted); font-size:18px; cursor:pointer; }
  .start-close:hover { color:var(--text); }
  .store-status { font-size:12px; color:var(--muted); margin:6px 0 12px; }
  .store-actions { display:flex; gap:8px; margin-top:12px; }
  .store-actions button { flex:1; padding:9px 10px; font-size:13px; cursor:pointer;
    background:var(--node); color:var(--text); border:1px solid var(--node-border); border-radius:9px; }
  .store-actions button:hover { border-color:var(--accent); }
  .linkish { display:block; width:100%; margin-top:12px; padding:8px; background:transparent;
    border:none; color:var(--muted); font-size:12px; cursor:pointer; }
  .linkish:hover { color:var(--text); }

  /* ---- toolbar section for editing the selected card(s) ---- */
  #toolbar .tdiv { width:1px; height:22px; background:var(--grid); margin:0 2px; flex:none; }
  #toolbar button:disabled, #toolbar button:disabled:hover { background:transparent; opacity:.3; cursor:default; }
  #toolbar button#edDelete:not(:disabled):hover { color:#e0564f; }

  /* ---- coarse pointer (touch) : bigger hit targets ---- */
  @media (pointer: coarse) {
    #toolbar button { width:40px; height:40px; }
    #toolbar button svg { width:22px; height:22px; }
    .node .addchild { width:40px; height:40px; right:-18px; bottom:-18px; font-size:24px; }
    .swatch { width:26px; height:26px; }
    .layoutchip { padding:6px 10px; }
  }
</style>
</head>
<body>
  <div id="toolbar">
    <button id="homeBtn" class="primary" title="Home — recent folders / open another" aria-label="Home — recent folders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span id="folderName"></span></button>
    <button id="addBtn" title="New node (Space)" aria-label="New node">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M12 9v6M9 12h6"/></svg></button>
    <button id="collapseAllBtn" title="Collapse every node" aria-label="Collapse all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5l4 4 4-4M8 19l4-4 4 4"/></svg></button>
    <button id="expandAllBtn" title="Expand every node" aria-label="Expand all">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4-4 4 4M8 15l4 4 4-4"/></svg></button>
    <button id="fitBtn" title="Focus selected card · fit whole map if none (F)" aria-label="Focus selected or fit map">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg></button>
    <button id="edgeBtn" title="Edge style: straight / orthogonal / bezier" aria-label="Cycle edge style">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2"/><circle cx="19" cy="18" r="2"/><path d="M7 6h7a3 3 0 0 1 3 3v7"/></svg></button>

    <!-- selected-card actions (enabled only with a selection) -->
    <span class="tdiv"></span>
    <button id="edRename" disabled title="Rename selected card (F2)" aria-label="Rename selected card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg></button>
    <button id="edAddChild" disabled title="Add child (Tab)" aria-label="Add child of selected card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v7a4 4 0 0 0 4 4h6"/><path d="M13 11l4 4-4 4"/></svg></button>
    <button id="edAddSibling" disabled title="Add sibling (Enter)" aria-label="Add sibling of selected card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
    <button id="edDuplicate" disabled title="Duplicate (D)" aria-label="Duplicate selected card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
    <button id="edDelete" disabled title="Delete selected card(s) (Esc, then Delete)" aria-label="Delete selected card(s)">

<script type="module">
/* ============================================================
   Markdown Mindmap — PoC v2: hierarchy + collapse + add-child
   Storage: one .md per node. Layout lives in each note's frontmatter as mm_* keys
   (mm_parent = parent note's path, mm_x/mm_y, mm_collapsed) — no sidecar, no ids on disk.
   The filename IS the node's identity; in-memory ids are ephemeral, minted per load.
   Edges are DERIVED from parent — no separate edge list.
   ============================================================ */

const state = {
  dir: null,
  nodes: new Map(),   // id -> {id,file,x,y,parent,collapsed,title,status,tags[],body,el,dirty}
  view: { x: 80, y: 40, k: 1 },
  selId: null,         // the "primary" selected node — drives the single-node editor fields
  sel: new Set(),      // full selection set (⌘-click / marquee); colour applies to all of these
  edgeStyle: 'orthogonal',   // 'straight' | 'orthogonal' | 'bezier' — restored from localStorage
  searchMatch: null,         // Set of ids matching the find query, or null when not searching
  readOnly: false,           // read-only mode: no saves, no edits; collapse/expand only
  idSeq: 1,
  toDelete: [],
  sidebarOpen: true,   // edit panel is open by default; toolbar button toggles it
};

const world = document.getElementById('world');
const stage = document.getElementById('stage');
const edgesSvg = document.getElementById('edges');
const togglesSvg = document.getElementById('toggles');
const statusEl = document.getElementById('status');
const setStatus = (t) => statusEl.textContent = t;

// ---------- theme (light / dark) ----------
const THEME_KEY = 'mindmap.theme';
const ICON_MOON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>`;
const ICON_SUN  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`;
function applyTheme(theme){
  const light = theme === 'light';
  document.body.classList.toggle('light', light);
  const btn = document.getElementById('themeBtn');
  if (btn) btn.innerHTML = light ? ICON_MOON : ICON_SUN;   // icon = the mode you'd switch TO
}
function initTheme(){
  let saved = null;
  try { saved = localStorage.getItem(THEME_KEY); } catch {}
  // fall back to the OS preference the first time
  if (!saved) saved = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  applyTheme(saved);
}
function toggleTheme(){
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  applyTheme(next);
  try { localStorage.setItem(THEME_KEY, next); } catch {}
}
document.getElementById('themeBtn').onclick = toggleTheme;
initTheme();

// escape text for safe insertion into SVG/HTML markup
function esc(s){ return String(s).replace(/[&<>"']/g, c => (
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- markdown -> HTML (compact, self-contained; the card is a clipped preview) ----------
// Inline emphasis on a PLAIN text run (escaped first so user text can't inject markup).
function mdEmphasis(s){
  return esc(s)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/__([^_]+)__/g,     '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, '$1<em>$2</em>')
    .replace(/(^|[^_\w])_([^_\s][^_]*?)_/g,  '$1<em>$2</em>')
    .replace(/~~([^~]+)~~/g, '<del>$1</del>');
}
// Links/wikilinks within a text run; emphasis is applied to the gaps and link labels.
//   [text](url) / bare https?:// → external link (new tab)
//   [[Note]] or [[Note|alias]]   → wikilink → focuses that node in the map
function mdLinks(text){
  const re = /\[([^\]]+)\]\(([^)\s]+)\)|\[\[([^\]|]+)(?:\|([^\]]+))?\]\]|(https?:\/\/[^\s)]+)/g;
  let out = '', last = 0, m;
  while ((m = re.exec(text))){
    out += mdEmphasis(text.slice(last, m.index));
    if (m[2])      out += `<a class="lk" href="${esc(m[2])}" target="_blank" rel="noopener">${mdEmphasis(m[1])}</a>`;
    else if (m[3]) out += `<a class="lk wikilink" data-target="${esc(m[3].trim())}">${esc((m[4]||m[3]).trim())}</a>`;
    else           out += `<a class="lk" href="${esc(m[5])}" target="_blank" rel="noopener">${esc(m[5])}</a>`;
    last = re.lastIndex;
  }
  out += mdEmphasis(text.slice(last));
  return out;
}
// Full inline pass: protect `code` spans first (no formatting inside), then links + emphasis.
function mdInline(text){
  let out = '', last = 0, m;
  const re = /`([^`]+)`/g;
  while ((m = re.exec(text))){
    out += mdLinks(text.slice(last, m.index));
    out += `<code>${esc(m[1])}</code>`;
    last = re.lastIndex;
  }
  out += mdLinks(text.slice(last));
  return out;
}
// Block-level pass: headings, lists, blockquotes, fenced code, rules, paragraphs.
function renderBodyHTML(md){
  const src = (md || '').replace(/\r\n?/g, '\n').trim();
  if (!src) return '';                 // empty body → nothing (no stray blank line under the title)
  const lines = src.split('\n');
  let html = '', i = 0, taskIdx = 0;   // taskIdx: nth checkbox in the body, for write-back on toggle
  const BLOCK = /^(#{1,6}\s|```|\s*>|\s*[-*+]\s|\s*\d+\.\s)/;
  while (i < lines.length){
    const line = lines[i];
    if (/^```/.test(line)){                                   // fenced code block
      i++; const code = [];
      while (i < lines.length && !/^```/.test(lines[i])) code.push(lines[i++]);
      i++;                                                    // skip closing fence
      html += `<pre><code>${esc(code.join('\n'))}</code></pre>`; continue;
    }
    let h;
    if ((h = line.match(/^(#{1,6})\s+(.*)$/))){               // heading
      html += `<h${h[1].length}>${mdInline(h[2])}</h${h[1].length}>`; i++; continue;
    }
    if (/^\s*(?:[-*_]\s*){3,}$/.test(line)){ html += '<hr>'; i++; continue; }   // horizontal rule
    if (/^\s*>/.test(line)){                                   // blockquote
      const q = [];
      while (i < lines.length && /^\s*>/.test(lines[i])) q.push(lines[i++].replace(/^\s*>\s?/, ''));
      html += `<blockquote>${q.map(mdInline).join('<br>')}</blockquote>`; continue;
    }
    if (/^\s*[-*+]\s+/.test(line)){                            // unordered list (incl. [ ]/[x] tasks)
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) items.push(lines[i++].replace(/^\s*[-*+]\s+/, ''));
      html += '<ul>' + items.map(it => {
        const tm = it.match(/^\[([ xX])\]\s+(.*)$/);
        if (tm) return `<li class="task"><input type="checkbox" class="taskbox" data-ti="${taskIdx++}"`
                     + `${tm[1].toLowerCase()==='x' ? ' checked' : ''}>${mdInline(tm[2])}</li>`;
        return `<li>${mdInline(it)}</li>`;
      }).join('') + '</ul>'; continue;
    }
    if (/^\s*\d+\.\s+/.test(line)){                            // ordered list
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) items.push(lines[i++].replace(/^\s*\d+\.\s+/, ''));
      html += `<ol>${items.map(it => `<li>${mdInline(it)}</li>`).join('')}</ol>`; continue;
    }
    // text run: gather until the next block. Every blank line is KEPT and rendered as an empty
    // line (like Obsidian) — including blanks right before/after a list or other block. A run
    // that's only blank lines (a gap between two blocks) becomes that many empty lines.
    const para = [];
    while (i < lines.length && !BLOCK.test(lines[i])) para.push(lines[i++]);
    if (para.some(l => l.trim())) html += `<p>${para.map(mdInline).join('<br>')}</p>`;
    else html += '<br>'.repeat(para.length);
  }
  return html;
}

// ---------- hierarchy helpers ----------
function childrenOf(id){ return [...state.nodes.values()].filter(n => n.parent === id); }
function isRoot(n){ return !n.parent || !state.nodes.has(n.parent); }
// A node's `collapsed` flag means "this branch is folded": the node ITSELF and all
// `collapsed` on a node hides its CHILDREN but keeps the node itself visible (outliner
// model). So a node is hidden only if one of its ANCESTORS is collapsed.
function isHidden(n){
  let p = n.parent && state.nodes.get(n.parent);
  while (p){
    if (p.collapsed) return true;
    p = p.parent && state.nodes.get(p.parent);
  }
  return false;
}
function descendantCount(id){
  let c = 0; for (const ch of childrenOf(id)) c += 1 + descendantCount(ch.id); return c;
}
// guard against cycles when re-parenting
function isAncestor(maybeAncestorId, nodeId){
  let p = state.nodes.get(nodeId);
  p = p && p.parent && state.nodes.get(p.parent);
  while (p){ if (p.id === maybeAncestorId) return true; p = p.parent && state.nodes.get(p.parent); }
  return false;
}

// ---------- markdown frontmatter parse/serialize ----------
// ---------- frontmatter: parsed as ORDERED entries so unknown keys round-trip untouched ----------
// Each entry groups a top-level `key:` line with any following continuation lines (indented
// values, `- list` items, blanks, comments) until the next top-level key. This lets us rewrite
// only the app-owned keys (tags/color/mm_*) while preserving everything else verbatim.
function parseFM(fmText){
  const entries = [];
  for (const line of fmText.split('\n')){
    const m = line.match(/^([\w-]+):(.*)$/);
    if (m) entries.push({ key: m[1], lines: [line] });
    else if (entries.length) entries[entries.length-1].lines.push(line);   // continuation
    else entries.push({ key: null, lines: [line] });
  }
  return entries;
}
function fmEntry(entries, key){ return entries.find(e => e.key === key); }
function fmValue(entries, key){
  const e = fmEntry(entries, key); if (!e) return '';
  return e.lines[0].slice(e.lines[0].indexOf(':')+1).trim();
}
function fmTags(entries){
  const e = fmEntry(entries, 'tags'); if (!e) return [];
  const inline = e.lines[0].slice(e.lines[0].indexOf(':')+1).trim();
  if (inline) return inline.replace(/^\[|\]$/g,'').split(',').map(s=>s.trim()).filter(Boolean);
  return e.lines.slice(1).map(l=>l.trim()).filter(l=>l.startsWith('-'))   // YAML list form
    .map(l=>l.replace(/^-\s*/,'').replace(/^["']|["']$/g,'').trim()).filter(Boolean);
}
function fmSet(entries, key, line){
  const e = fmEntry(entries, key);
  if (e) e.lines = [line]; else entries.push({ key, lines:[line] });
}
function fmRemove(entries, key){
  const i = entries.findIndex(e => e.key === key);
  if (i >= 0) entries.splice(i, 1);
}

function parseMd(text, fileName) {
  const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  const entries = m ? parseFM(m[1]) : [];
  const body = m ? m[2] : text;
  // The TITLE is always the filename (without .md) — it's the node's identity on disk.
  const title = (fileName || 'Untitled').replace(/\.md$/i, '').trim() || 'Untitled';
  const num = (v) => (v !== '' && !isNaN(+v)) ? +v : null;
  return {
    title,
    fmEntries: entries,                    // full original frontmatter, preserved on save
    color: fmValue(entries, 'color'),      // palette key, e.g. 'blue'
    keepStatus: fmValue(entries, 'status'),
    tags: fmTags(entries),
    body: body.trim(),
    // mindmap layout — note identity is its filename; parent stored as the PARENT note's path.
    mm: {
      parent: fmValue(entries, 'mm_parent'),
      x: num(fmValue(entries, 'mm_x')),
      y: num(fmValue(entries, 'mm_y')),
      collapsed: fmValue(entries, 'mm_collapsed') === 'true',
      layout: fmValue(entries, 'mm_layout') || 'none',   // none(inherit) | free | line | fan | two-sided
      dir: fmValue(entries, 'mm_dir') || 'right',         // left | right | top | bottom
    },
  };
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
// Rebuild the file from the ORIGINAL frontmatter entries, touching only the app-owned keys:
// tags, color, and the mm_* layout. `date`, `category`, `aliases`, custom fields, etc. are
// kept verbatim; `date` is stamped only when the note has none yet (never overwritten).
function serializeMd(n) {
  const entries = (n.fmEntries || []).map(e => ({ key: e.key, lines: [...e.lines] }));
  entries.filter(e => e.key && e.key.startsWith('mm_')).forEach(e => fmRemove(entries, e.key));
  // (re-add layout fresh below; strip any stale mm_* first)
  for (const k of ['mm_parent','mm_x','mm_y','mm_collapsed','mm_layout','mm_dir']) fmRemove(entries, k);
  fmSet(entries, 'tags', `tags: ${n.tags.length ? `[${n.tags.join(', ')}]` : '[]'}`);
  if (n.color) fmSet(entries, 'color', `color: ${n.color}`); else fmRemove(entries, 'color');
  if (!fmEntry(entries, 'date')) entries.unshift({ key:'date', lines:[`date: ${todayISO()}`] });
  const parentNode = n.parent && state.nodes.get(n.parent);
  if (parentNode) entries.push({ key:'mm_parent', lines:[`mm_parent: ${parentNode.file}`] });
  entries.push({ key:'mm_x', lines:[`mm_x: ${Math.round(n.x)}`] });
  entries.push({ key:'mm_y', lines:[`mm_y: ${Math.round(n.y)}`] });
  if (n.collapsed) entries.push({ key:'mm_collapsed', lines:['mm_collapsed: true'] });
  if (n.layoutType && n.layoutType !== 'none'){   // none (inherit) is the default — omit from file
    entries.push({ key:'mm_layout', lines:[`mm_layout: ${n.layoutType}`] });
    entries.push({ key:'mm_dir',    lines:[`mm_dir: ${n.layoutDir || 'right'}`] });
  }
  const fm = entries.flatMap(e => e.lines).join('\n');
  const body = n.body.trim();
  return `---\n${fm}\n---\n` + (body ? '\n' + body + '\n' : '\n');
}

// ---------- rendering ----------
function applyView() {
  world.style.transform = `translate(${state.view.x}px,${state.view.y}px) scale(${state.view.k})`;
}
// Smoothly glide the view to (tx,ty) instead of snapping. Any direct pan/zoom cancels it
// (cancelViewAnim) so the animation never fights the user's own input.
let viewAnim = null;
function cancelViewAnim(){ if (viewAnim){ cancelAnimationFrame(viewAnim); viewAnim = null; } }
function animateViewTo(tx, ty, tk = state.view.k, dur = 420){
  cancelViewAnim();
  const sx = state.view.x, sy = state.view.y, sk = state.view.k;
  if (Math.abs(tx-sx) < 1 && Math.abs(ty-sy) < 1 && Math.abs(tk-sk) < .001){
    state.view.x = tx; state.view.y = ty; state.view.k = tk; applyView(); return;
  }
  const t0 = performance.now();
  const ease = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;   // easeInOutCubic
  function step(now){
    const p = Math.min(1, (now - t0)/dur), e = ease(p);
    state.view.x = sx + (tx-sx)*e;
    state.view.y = sy + (ty-sy)*e;
    // zoom is perceptually multiplicative, so interpolate k geometrically — with the eased
    // parameter this gives a smooth ease-in/ease-out zoom rather than a linear ramp.
    state.view.k = sk * Math.pow(tk/sk, e);
    applyView();
    viewAnim = p < 1 ? requestAnimationFrame(step) : null;
  }
  viewAnim = requestAnimationFrame(step);
}
function nodeEl(n) {
  if (n.el) return n.el;
  const el = document.createElement('div');
  el.dataset.id = n.id;
  el.innerHTML = `<div class="title"></div><div class="body"></div>
    <span class="hidden-count"></span><div class="addchild" title="add child (Tab)">+</div>`;
  world.appendChild(el);
  n.el = el;
  bindNodeDrag(n);
  el.querySelector('.addchild').addEventListener('pointerdown', (e)=>{ e.stopPropagation(); });
  el.querySelector('.addchild').addEventListener('click', (e)=>{ e.stopPropagation(); addChild(n.id); });
  // body links: open externally, or jump to a wikilink's node. Don't let the click bubble to
  // the card (which would select / toggle the panel); pointerdown is stopped in bindNodeDrag.
  el.querySelector('.body').addEventListener('click', (e)=>{
    const a = e.target.closest('a.lk'); if (!a) return;
    e.stopPropagation();
    if (a.classList.contains('wikilink')){
      e.preventDefault();
      focusByTitle(a.dataset.target);
    }
  });
  // task checkboxes: toggle the matching [ ]/[x] in the body and persist
  el.querySelector('.body').addEventListener('change', (e)=>{
    const cb = e.target.closest('input.taskbox'); if (!cb) return;
    e.stopPropagation();
    toggleTask(n, +cb.dataset.ti);
  });
  // inline title rename: typing reflows + validates; Enter/Tab commit, Escape cancels, blur commits
  const titleEl = el.querySelector('.title');
  titleEl.addEventListener('input',   ()  => onInlineInput(n));
  titleEl.addEventListener('keydown', (e) => onInlineKeydown(e, n));
  titleEl.addEventListener('blur',    ()  => { if (inlineEdit && inlineEdit.id === n.id) endInlineEdit(); });
  // double-click a node to collapse/expand its children (cancels a pending slow-click rename)
  el.addEventListener('dblclick', (e)=>{
    e.stopPropagation(); e.preventDefault();
    clearTimeout(renameTimer);          // a double-click means "fold", not "rename"
    toggleCollapse(n.id);
  });
  return el;
}
// A card's colour is its own, or — if unset — inherited from the nearest coloured ancestor.
// While Alt-dragging to detach, preview the result: treat the dragged node as a root (stop the
// ancestor walk there), so it — and its descendants — show the colour they'd have once cut loose.
function effectiveColor(n){
  const detachId = (drag && drag.alt && !drag.shift) ? drag.active.id : null;
  for (let c = n; c; c = (c.id === detachId) ? null : (c.parent && state.nodes.get(c.parent)))
    if (c.color) return c.color;
  return 'none';
}
function paintNode(n) {
  const el = nodeEl(n);
  if (isHidden(n)) { el.style.display = 'none'; return; }
  el.style.display = '';
  const collapsedKids = n.collapsed && childrenOf(n.id).length > 0;
  el.className = 'node c-' + effectiveColor(n)
    + (state.sel.has(n.id) ? ' sel' : '')
    + (state.sel.size === 1 && state.sel.has(n.id) ? ' solo' : '')   // lone selection → show +
    + (collapsedKids ? ' has-collapsed' : '')
    + ((n.body && n.body.trim()) ? '' : ' no-body')
    + (state.searchMatch && !state.searchMatch.has(n.id) ? ' search-dim' : '');
  el.style.left = n.x + 'px';
  el.style.top = n.y + 'px';
  // don't clobber the title while it's being inline-edited (the user is typing into it)
  if (!(inlineEdit && inlineEdit.id === n.id)) el.querySelector('.title').textContent = n.title;
  el.querySelector('.body').innerHTML = renderBodyHTML(n.body);
  if (collapsedKids) el.querySelector('.hidden-count').textContent = '+' + descendantCount(n.id);
}
const NODE_W = 200;
function nodeH(n){ return (n.el && n.el.offsetHeight) || 64; } // live height (falls back pre-render)
function nodeCenter(n){ return { x: n.x + NODE_W/2, y: n.y + nodeH(n)/2 }; }

// Bright per-branch line colours (match the .c-*-cardline borders); 'none' falls back to --edge.
const EDGE_TINT = { slate:'#7088e0', red:'#f25c72', amber:'#f2ab44', green:'#3fcf81',
  teal:'#33c5d8', blue:'#5fa3f5', violet:'#9d70f0', pink:'#f262ad', grey:'#4a5a6e' };
const EDGE_GAP = 0;    // px the line stops short of a card border (0 = touch the border)

// polyline → path with rounded corners (quadratic at each interior vertex, clamped to leg length)
function roundedPath(pts, r){
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length-1; i++){
    const p = pts[i], prev = pts[i-1], next = pts[i+1];
    const toward = (q, dist) => {
      const dx = q.x-p.x, dy = q.y-p.y, L = Math.hypot(dx, dy) || 1;
      return { x: p.x + dx/L*dist, y: p.y + dy/L*dist };
    };
    const e1 = toward(prev, Math.min(r, Math.hypot(p.x-prev.x, p.y-prev.y)/2));
    const e2 = toward(next, Math.min(r, Math.hypot(p.x-next.x, p.y-next.y)/2));
    d += ` L ${e1.x} ${e1.y} Q ${p.x} ${p.y} ${e2.x} ${e2.y}`;
  }
  const last = pts[pts.length-1];
  return d + ` L ${last.x} ${last.y}`;
}
// Build an SVG path `d` for a parent→child edge in the current style:
//   straight    — one diagonal segment between the facing borders
//   orthogonal  — right-angle elbow with rounded corners (H & V only)
//   bezier      — smooth curve with tangents along the dominant axis
// All styles leave a small gap at each card border.
// Which border a parent→child edge leaves from. A line/fan parent owns its children's side,
// so every edge leaves from its layoutDir border; a free parent connects each child from the
// nearest dominant-axis border (so a child dragged left connects on the left, etc.).
function edgeSide(parent, child){
  // Use the EFFECTIVE layout, not the raw field: a node with type `none` that inherits
  // line/fan from an ancestor owns its children's side too, so its edges must leave from
  // the inherited direction's border — otherwise an inherited-fan node draws free-style
  // edges and looks different from an explicit-fan node with the same placement.
  const eff = effectiveLayout(parent);
  if (eff.type === 'line' || eff.type === 'fan') return dirSide(eff.dir);
  const pc = nodeCenter(parent), cc = nodeCenter(child);
  // two-sided splits along the direction's AXIS, so the edge must leave from the axis end that
  // matches the child's wing — never the cross axis (outer children spread wide on the cross
  // axis would otherwise pick left/right on an up/down split).
  if (eff.type === 'two-sided'){
    const horizAxis = dirSide(eff.dir) === 'left' || dirSide(eff.dir) === 'right';
    return horizAxis ? (cc.x >= pc.x ? 'right' : 'left') : (cc.y >= pc.y ? 'down' : 'up');
  }
  const dx = cc.x - pc.x, dy = cc.y - pc.y;
  if (Math.abs(dx) >= Math.abs(dy)) return dx >= 0 ? 'right' : 'left';
  return dy >= 0 ? 'down' : 'up';
}
function edgePath(parent, child){
  const pc = nodeCenter(parent), cc = nodeCenter(child);
  const side = edgeSide(parent, child);
  const horizontal = side === 'left' || side === 'right';
  let a, b;
  if (side === 'down')      { a = { x:pc.x, y:parent.y + nodeH(parent) }; b = { x:cc.x, y:child.y }; }
  else if (side === 'up')   { a = { x:pc.x, y:parent.y };                 b = { x:cc.x, y:child.y + nodeH(child) }; }
  else if (side === 'right'){ a = { x:parent.x + NODE_W, y:pc.y };        b = { x:child.x, y:cc.y }; }
  else                      { a = { x:parent.x, y:pc.y };                 b = { x:child.x + NODE_W, y:cc.y }; }
  if (state.edgeStyle === 'straight') return `M ${a.x} ${a.y} L ${b.x} ${b.y}`;
  if (state.edgeStyle === 'bezier'){
    if (horizontal){ const k = (b.x - a.x)/2; return `M ${a.x} ${a.y} C ${a.x+k} ${a.y} ${b.x-k} ${b.y} ${b.x} ${b.y}`; }
    const k = (b.y - a.y)/2;  return `M ${a.x} ${a.y} C ${a.x} ${a.y+k} ${b.x} ${b.y-k} ${b.x} ${b.y}`;
  }

  const pts = horizontal
    ? [a, { x:(a.x+b.x)/2, y:a.y }, { x:(a.x+b.x)/2, y:b.y }, b]
    : [a, { x:a.x, y:(a.y+b.y)/2 }, { x:b.x, y:(a.y+b.y)/2 }, b];

}
function paintEdges() {
  // While filtering, hide ALL lines — dimmed cards are semi-transparent, so faint lines would
  // show through them and read as clutter. Cleaner to drop the lines entirely until search ends.
  if (state.searchMatch){ edgesSvg.innerHTML = ''; togglesSvg.innerHTML = ''; return; }
  let svg = '';
  // Draw a connector for every parent→child edge where BOTH ends are visible.
  // A collapsed node hides its children, so those edges simply don't appear.
  for (const n of state.nodes.values()) {
    if (isRoot(n)) continue;
    const parent = state.nodes.get(n.parent);
    if (!parent) continue;
    if (isHidden(parent) || isHidden(n)) continue;
    // While Alt-dragging this node we're previewing detach-to-root, so drop its parent
    // edge entirely (no line, not even a dotted one).
    if (drag && drag.alt && !drag.shift && drag.n.id === n.id) continue;
    // tint by the child's branch colour
    const tint = EDGE_TINT[effectiveColor(n)];
    const style = tint ? ` style="stroke:${tint}"` : '';
    svg += `<path${style} d="${edgePath(parent, n)}"/>`;

}
function paintAll() {
  for (const n of state.nodes.values()) paintNode(n);
  paintEdges();
}

// ---------- animated relayout (expand / collapse) ----------
function prefersReducedMotion(){ try { return matchMedia('(prefers-reduced-motion: reduce)').matches; } catch { return false; } }
function placeNodeEl(n){ if (n.el){ n.el.style.left = n.x + 'px'; n.el.style.top = n.y + 'px'; } }
function setNodeElXY(n, x, y){ if (n.el){ n.el.style.left = x + 'px'; n.el.style.top = y + 'px'; } }
// Newly revealed cards emanate from the nearest ancestor that was already on screen.
function ancestorStart(node, before){
  let p = node.parent ? state.nodes.get(node.parent) : null;
  while (p){ const b = before.get(p.id); if (b) return b; p = p.parent ? state.nodes.get(p.parent) : null; }

}
// Cards glide to new spots via a CSS transition; SVG edges can't transition, so for the duration
// we redraw them each frame from the cards' live (animating) on-screen positions.
let animToken = 0;
function followEdges(tok, ms){
  const t0 = performance.now();

    if (tok !== animToken) return;                  // superseded by a newer animation
    const saved = [];
    for (const n of state.nodes.values()){
      if (!n.el || isHidden(n)) continue;
      const c = getComputedStyle(n.el);             // interpolated left/top while transitioning
      saved.push([n, n.x, n.y]);
      n.x = parseFloat(c.left) || n.x; n.y = parseFloat(c.top) || n.y;
    }
    paintEdges();
    for (const [n,x,y] of saved){ n.x = x; n.y = y; }   // restore logical (final) positions

// Run a structural change (a collapse toggle) and CSS-animate the resulting reflow.
function withLayoutAnimation(mutate){
  const before = new Map();
  for (const m of state.nodes.values()) if (m.el && !isHidden(m)) before.set(m.id, { x:m.x, y:m.y });
  mutate();
  paintAll();          // reveal/hide DOM and measure real heights
  applyLayouts();      // compute FINAL positions into n.x/n.y (DOM not updated yet)
  const visible = [...state.nodes.values()].filter(m => m.el && !isHidden(m));
  const tok = ++animToken;                           // supersede any in-flight animation
  if (prefersReducedMotion()){ for (const m of visible){ m.el.classList.remove('lt-anim'); placeNodeEl(m); } paintEdges(); return; }
  // 1) park every visible card at its STARTING spot with no transition; just-revealed cards
  //    also start invisible so they fade in (covers free layouts where nothing reflows)
  for (const m of visible){
    m.el.classList.remove('lt-anim');
    const s = before.get(m.id) || ancestorStart(m, before);
    setNodeElXY(m, s.x, s.y);
    if (!before.has(m.id)) m.el.style.opacity = '0';

  void document.body.offsetWidth;                    // commit the start positions before transitioning
  // 2) turn on the transition and move every card to its FINAL spot → the browser animates left/top
  const DUR = 320;
  for (const m of visible){ m.el.classList.add('lt-anim'); placeNodeEl(m); m.el.style.opacity = ''; }
  // 3) edges follow the moving cards; drop the transition class once it's done
  followEdges(tok, DUR + 20);

// ---------- edge style (straight / orthogonal / bezier), persisted ----------
const EDGE_KEY = 'mindmap.edgeStyle';
const EDGE_STYLES = ['orthogonal', 'bezier', 'straight'];
function initEdgeStyle(){
  let saved = null;
  try { saved = localStorage.getItem(EDGE_KEY); } catch {}
  if (EDGE_STYLES.includes(saved)) state.edgeStyle = saved;
}
function cycleEdgeStyle(){
  const i = EDGE_STYLES.indexOf(state.edgeStyle);
  state.edgeStyle = EDGE_STYLES[(i + 1) % EDGE_STYLES.length];
  try { localStorage.setItem(EDGE_KEY, state.edgeStyle); } catch {}
  paintEdges();
  setStatus(`Edge style: ${state.edgeStyle}`);
}
initEdgeStyle();

// Toggle one node's collapse (folds/unfolds its direct children & everything below them).
function toggleCollapse(id){
  const n = state.nodes.get(id); if (!n) return;
  if (childrenOf(n.id).length === 0) return;   // nothing to fold on a leaf
  // animate the reflow; withLayoutAnimation paints, measures heights, and lays out the children
  withLayoutAnimation(() => { n.collapsed = !n.collapsed; n.dirtyLayout = true; });
  scheduleSave();
  setStatus(n.collapsed ? `Collapsed “${n.title}”` : `Expanded “${n.title}”`);
}
// Flip the idx-th task checkbox in a node's body and write the change back to disk.
function toggleTask(n, idx){
  if (state.readOnly) return;
  let i = 0;
  n.body = n.body.replace(/^(\s*[-*+]\s+)\[([ xX])\]/gm, (m, pre, mark) =>
    i++ === idx ? pre + (mark === ' ' ? '[x]' : '[ ]') : m);
  n.dirty = true;
  if (state.selId === n.id) edBody.value = n.body;   // keep the sidebar editor in sync
  paintNode(n); scheduleSave();
}

// ---------- node dragging (moves the whole subtree) ----------
let drag = null;
let autoPanRAF = null;
// While a node is dragged to the screen edge, pan the view so you can drop onto cards that are
// currently off-screen. The view pans toward the edge the cursor sits in, and the dragged subtree
// is shifted in world-space by the inverse so it stays glued under the (stationary) cursor.
function stopAutoPan(){ if (autoPanRAF){ cancelAnimationFrame(autoPanRAF); autoPanRAF = null; } }
function autoPanStep(){
  autoPanRAF = null;
  if (!drag || !drag.moved || state.readOnly) return;
  // Available canvas = the stage minus the toolbar (above it) and the edit panel (to its right).
  // Panning kicks in as the cursor reaches those obstructions, so you can drag onto / past them.
  const r = stage.getBoundingClientRect();
  const ed = document.getElementById('editor');
  const right = (ed && ed.classList.contains('open')) ? Math.min(r.right, ed.getBoundingClientRect().left) : r.right;
  const M = 56, MAX = 16;   // edge band (px) and max pan speed (px/frame)
  let vx = 0, vy = 0;
  const x = drag.cx, y = drag.cy;
  if (x < r.left + M)     vx =  Math.min(1, (r.left + M - x) / M);
  else if (x > right - M) vx = -Math.min(1, (x - (right - M)) / M);
  if (y < r.top + M)        vy =  Math.min(1, (r.top + M - y) / M);
  else if (y > r.bottom - M) vy = -Math.min(1, (y - (r.bottom - M)) / M);
  if (vx || vy){
    cancelViewAnim();
    vx *= MAX; vy *= MAX;
    state.view.x += vx; state.view.y += vy; applyView();
    // shift the dragged subtree's anchors opposite the pan so the cursor-to-card offset never
    // changes (only `targets` — `start` keeps its own positions for clone/reset).
    const wdx = -vx / state.view.k, wdy = -vy / state.view.k;
    for (const s of drag.targets.values()){ s.x += wdx; s.y += wdy; }
    const ddx = (drag.cx - drag.sx) / state.view.k, ddy = (drag.cy - drag.sy) / state.view.k;
    for (const [id, s] of drag.targets){
      const m = state.nodes.get(id); if (!m) continue;
      m.x = s.x + ddx; m.y = s.y + ddy; m.dirtyLayout = true; paintNode(m);
    }
    paintEdges();
    if (!drag.multi) updateDropTarget(drag.active, { clientX: drag.cx, clientY: drag.cy });
  }

}
let inlineEdit = null;   // { id, orig, el } while a card title is being renamed in place
let renameTimer = null;  // pending slow-click rename; any node interaction cancels it
function subtreeIds(id){
  // id + every descendant
  const out = [id];
  for (const ch of childrenOf(id)) out.push(...subtreeIds(ch.id));
  return out;
}
function bindNodeDrag(n) {
  const el = n.el;
  el.addEventListener('pointerdown', (e) => {
    if (e.target.classList.contains('addchild')) return;
    if (e.target.closest('a.lk, input.taskbox')) { e.stopPropagation(); return; }  // let links/checkboxes click, not drag
    // while this card's title is being renamed, let clicks place the caret — don't start a drag
    if (inlineEdit && inlineEdit.id === n.id) { e.stopPropagation(); return; }
    clearTimeout(renameTimer);   // any fresh interaction cancels a pending slow-click rename
    e.stopPropagation();
    el.setPointerCapture(e.pointerId);
    // Dragging a card that's part of a multi-selection moves the WHOLE selection at once;
    // otherwise just this card's subtree. `active` is the node dragged/dropped; `targets`
    // are the nodes that follow the cursor (or, after a Shift-clone, just the clone).
    const multi = state.sel.has(n.id) && state.sel.size > 1;
    const rootIds = multi ? [...state.sel] : [n.id];
    const ids = [...new Set(rootIds.flatMap(id => subtreeIds(id)))];
    const start = new Map(ids.map(id => {
      const m = state.nodes.get(id); return [id, { x:m.x, y:m.y }];
    }));
    // targets gets its OWN {x,y} objects (not new Map(start), which shares the value refs) so the
    // edge auto-pan can shift the dragged anchors without also moving the pinned `start` positions.
    const targets = new Map([...start].map(([id, s]) => [id, { x:s.x, y:s.y }]));
    drag = { n, active:n, multi, sx:e.clientX, sy:e.clientY, cx:e.clientX, cy:e.clientY, start, targets,
             moved:false, dropTarget:null, alt:e.altKey, shift:e.shiftKey, cloned:false,
             meta: e.metaKey || e.ctrlKey };   // ⌘/Ctrl-click toggles this card in the selection
  });
  el.addEventListener('pointermove', (e) => {
    if (!drag || drag.n !== n) return;
    if (state.readOnly) return;        // no moving/reparenting in read-only (click & dbl-click still work)
    drag.alt = e.altKey; drag.shift = drag.shift || e.shiftKey; // Shift = clone, Alt = detach
    drag.cx = e.clientX; drag.cy = e.clientY;   // remembered for edge auto-pan
    const dx = (e.clientX - drag.sx)/state.view.k, dy = (e.clientY - drag.sy)/state.view.k;
    if (Math.abs(dx)+Math.abs(dy) > 2){ drag.moved = true; document.body.classList.add('grabbing'); }
    // Shift+drag: leave the ORIGINAL where it is and drag a fresh clone away instead.
    // (Clone applies to a single card only; a multi-selection drag is always a plain move.)
    if (!drag.multi && drag.shift && drag.moved && !drag.cloned){
      drag.cloned = true;
      for (const [id, s] of drag.start){            // pin the original subtree back to start
        const m = state.nodes.get(id); if (m){ m.x = s.x; m.y = s.y; m.dirtyLayout = false; }
      }
      const sp = drag.start.get(n.id);
      const clone = leaveClone(drag.active, sp);     // clone sits at the original's start spot
      drag.active = clone;                           // …and becomes the thing we drag/drop
      drag.targets = new Map([[clone.id, { x:sp.x, y:sp.y }]]);
      paintAll();                                    // render + bind the new clone node
    }
    // follow the cursor smoothly while dragging; the snap-to-grid happens on drop so
    // the motion feels soft but items always come to rest on the 20px grid.
    for (const [id, s] of drag.targets){
      const m = state.nodes.get(id); if (!m) continue;
      m.x = s.x + dx; m.y = s.y + dy; m.dirtyLayout = true;
      paintNode(m);
    }
    paintEdges();
    // reconnect: highlight a valid drop target (single-card drag only; multi-drag just moves)
    if (drag.moved && !drag.multi) updateDropTarget(drag.active, e);
    if (drag.moved && !autoPanRAF) autoPanRAF = requestAnimationFrame(autoPanStep);  // edge auto-pan
  });

    stopAutoPan();
    if (drag && drag.n === n) {
      const act = drag.active;
      if (!drag.moved) {
        if (drag.meta) toggleSel(n.id);                 // ⌘/Ctrl-click: add/remove from selection
        else if (state.selId !== n.id || state.sel.size !== 1) selectNode(n.id);
        else if (!state.readOnly) {
          // a second (slow) click on the already-sole-selected card = rename in place, Finder-style.
          // Delay it so a double-click (which fires dblclick first) can cancel it and fold instead.
          clearTimeout(renameTimer);
          renameTimer = setTimeout(() => startInlineEdit(n), 260);
        }
      } else {
        // dropped onto a node? re-parent. Alt+drop on empty canvas? detach to root.
        // Otherwise it's just a move.
        const tgt = drag.dropTarget;

        act.el?.classList.remove('reparent-ghost');

          // (a clone keeps where you dropped it, since that's a fresh card you're placing).
          if (!drag.cloned){
            for (const [id, s] of drag.targets){
              const m = state.nodes.get(id); if (m){ m.x = s.x; m.y = s.y; m.dirtyLayout = true; }
            }
          }
          reparent(act.id, tgt);
        } else {
          // snap onto the 20px grid: align the dragged node, shift the rest of its
          // subtree by the same delta so relative layout is preserved.
          const GRID = 20;
          const ddx = Math.round(act.x / GRID) * GRID - act.x;
          const ddy = Math.round(act.y / GRID) * GRID - act.y;
          for (const id of drag.targets.keys()){
            const m = state.nodes.get(id); if (!m) continue;
            m.x += ddx; m.y += ddy; m.dirtyLayout = true;
          }
          if (drag.alt && !drag.shift && act.parent) {
            act.parent = null;
            setStatus(`“${act.title}” is now a root`);
          }
          paintAll();
        }
        reorderDraggedParents(drag.targets.keys());   // a drag is the ONLY thing that reorders siblings
        applyLayouts(); paintAll();   // re-snap any dragged child back into its parent's layout
        if (drag.cloned) selectNode(act.id);   // select the new clone you just dragged out
        scheduleSave();
      }
    }
    drag = null;
    document.body.classList.remove('grabbing');
  });
}
// Update the detach preview the instant Alt is pressed/released mid-drag, even if the pointer
// isn't moving: repaint the dragged subtree (its colour previews the detached result) and the edges.
function paintDetachPreview(){
  if (drag) for (const id of subtreeIds(drag.active.id)){ const m = state.nodes.get(id); if (m) paintNode(m); }
  paintEdges();
}
window.addEventListener('keydown', (e) => { if (drag && e.key === 'Alt'){ drag.alt = true;  paintDetachPreview(); } });
window.addEventListener('keyup',   (e) => { if (drag && e.key === 'Alt'){ drag.alt = false; paintDetachPreview(); } });

// ---------- reconnect (re-parent by drag-and-drop) ----------
function updateDropTarget(dragged, e){
  const sub = new Set(subtreeIds(dragged.id)); // dragged card + all its descendants
  // topmost .node under the cursor that isn't the dragged card itself
  let hovered = null;
  for (const el of document.elementsFromPoint(e.clientX, e.clientY)){
    const nd = el.closest && el.closest('.node');
    if (nd && nd.dataset.id !== dragged.id){ hovered = nd.dataset.id; break; }
  }
  clearDropTarget();
  let target = null;
  // Refusing to drop onto your own child/descendant would make a cycle — say so out loud,
  // otherwise the drag just silently does nothing and looks broken.
  if (hovered && sub.has(hovered)){
    setStatus(`Can’t parent “${dragged.title}” onto its own child/descendant`);
  } else if (hovered && hovered === dragged.parent){   // already its parent — nothing to do
    const p = state.nodes.get(hovered);
    setStatus(`“${dragged.title}” is already a child of “${p ? p.title : 'that card'}”`);
  } else if (hovered){
    target = hovered;
  }
  if (drag) drag.dropTarget = target;
  if (target){
    const tEl = state.nodes.get(target)?.el;
    if (tEl) tEl.classList.add('drop-target');
  }
  // poised over a valid parent → ghost the dragged card so the parent shows through
  if (dragged.el) dragged.el.classList.toggle('reparent-ghost', !!target);
}
function clearDropTarget(){
  document.querySelectorAll('.node.drop-target').forEach(el => el.classList.remove('drop-target'));
}
function reparent(childId, newParentId){
  if (state.readOnly) return;
  const child = state.nodes.get(childId);
  if (!child || childId === newParentId) return;
  if (isAncestor(childId, newParentId)) return; // would create a cycle
  child.parent = newParentId;
  child.dirtyLayout = true;
  applyLayouts(); paintAll();
  setStatus(`Re-parented “${child.title}” → “${state.nodes.get(newParentId).title}”`);
}

// ---------- add child ----------
function addChild(parentId){
  if (state.readOnly) return;
  const parent = state.nodes.get(parentId); if (!parent) return;
  if (parent.collapsed){ parent.collapsed = false; } // reveal so the new child is visible
  const sibs = childrenOf(parentId);
  const id = 'n' + (state.idSeq++);
  const n = {
    id, file:null,
    x: parent.x + 40 + sibs.length * 30,
    y: parent.y + 150 + sibs.length * 10,
    parent: parentId, collapsed:false,
    title: uniqueTitle('New Node'), color:'', keepStatus:'', tags:[], body:'',
    layoutType:'none', layoutDir:'right',
    dirty:true, dirtyLayout:true,
  };
  state.nodes.set(id, n);
  applyLayouts();        // a line/fan parent immediately slots the new child into place
  paintAll();
  selectNode(id);
  startInlineEdit(n);    // drop straight into renaming the fresh card
  scheduleSave();
}

// Add a SIBLING of `refId` — a new node sharing its parent. For a parented node we delegate
// to addChild so the parent's order/layout handling stays in one place; a root-level node has
// no parent, so its "sibling" is a fresh unconnected node placed just below it.
function createSibling(refId){
  if (state.readOnly) return;
  const ref = state.nodes.get(refId); if (!ref) return;
  if (ref.parent != null) return addChild(ref.parent);
  return createNode({ x: ref.x, y: ref.y + nodeH(ref) + 40 });
}

// ---------- pan / zoom ----------
function screenToWorld(sx, sy) {
  const r = stage.getBoundingClientRect();
  return { x:(sx - r.left - state.view.x)/state.view.k, y:(sy - r.top - state.view.y)/state.view.k };
}
let pan = null, marquee = null, spaceHeld = false, spaceUsedForPan = false;
const marqueeEl = document.createElement('div');
marqueeEl.id = 'marquee'; stage.appendChild(marqueeEl);

// ---- touch gestures: track each finger that lands on the empty canvas. One finger pans,
// two fingers pinch-zoom + pan. (Mouse keeps Space-to-pan / marquee-select behaviour.)
const gPointers = new Map();   // pointerId -> {x,y}
let pinch = null;              // { dist, cx, cy } of the active two-finger gesture
const gDist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
function startPinch(){
  const [a,b] = [...gPointers.values()];
  pinch = { dist: gDist(a,b), cx:(a.x+b.x)/2, cy:(a.y+b.y)/2 };
}

// Empty-canvas drag = rubber-band SELECT (mouse) or PAN (touch). Hold Space / middle-button to PAN.
stage.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.node')) return;            // node drags capture their own pointer
  cancelViewAnim();

  if (e.pointerType !== 'mouse'){                   // touch / pen
    gPointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if (gPointers.size === 1){                      // one finger → pan (no Space key needed)
      pan = { sx:e.clientX, sy:e.clientY, ox:state.view.x, oy:state.view.y };
      stage.classList.add('panning');
    } else if (gPointers.size === 2){               // second finger → pinch-zoom + two-finger pan
      pan = null; marquee = null; marqueeEl.style.display = 'none';
      startPinch();
    }
    return;
  }

  if (spaceHeld || e.button === 1){                 // hand-pan
    if (spaceHeld) spaceUsedForPan = true;
    pan = { sx:e.clientX, sy:e.clientY, ox:state.view.x, oy:state.view.y };
    stage.classList.add('panning');
    return;
  }
  // start a marquee. ⌘/Ctrl keeps the existing selection and adds to it.
  marquee = { sx:e.clientX, sy:e.clientY, add:e.metaKey||e.ctrlKey, base:new Set(state.sel), moved:false };
  drawMarquee(e.clientX, e.clientY);
  marqueeEl.style.display = 'block';
});
window.addEventListener('pointermove', (e) => {
  if (gPointers.has(e.pointerId)){
    gPointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if (pinch && gPointers.size >= 2){
      const [a,b] = [...gPointers.values()];
      const nd = gDist(a,b), ncx = (a.x+b.x)/2, ncy = (a.y+b.y)/2;
      const r = stage.getBoundingClientRect();
      if (pinch.dist > 0) zoomAt(ncx - r.left, ncy - r.top, nd / pinch.dist);
      state.view.x += ncx - pinch.cx;               // pan by the midpoint's movement
      state.view.y += ncy - pinch.cy;
      applyView();
      pinch.dist = nd; pinch.cx = ncx; pinch.cy = ncy;
      return;
    }

  }
  if (pan){
    state.view.x = pan.ox + (e.clientX - pan.sx);
    state.view.y = pan.oy + (e.clientY - pan.sy);
    applyView(); return;
  }
  if (marquee){
    if (Math.abs(e.clientX-marquee.sx) + Math.abs(e.clientY-marquee.sy) > 3) marquee.moved = true;

    if (marquee.moved) selectWithinMarquee(e.clientX, e.clientY);

});
function endGesturePointer(e){

  if (gPointers.size === 1){                         // back to one finger → resume panning
    const p = [...gPointers.values()][0];
    pan = { sx:p.x, sy:p.y, ox:state.view.x, oy:state.view.y };
  } else if (gPointers.size === 0){
    pan = null; stage.classList.remove('panning');
    // a tap that didn't pan and wasn't a pinch → deselect (mirrors mouse click-on-empty)
    if (wasOne && start && Math.abs(e.clientX-start.sx) + Math.abs(e.clientY-start.sy) <= 6 && state.sel.size)
